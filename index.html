<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osiedle Misja Kontakt - LGC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SCENA -->
<div class="scene" id="scene"></div>

<!-- CHMURY PIXEL ART -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>

<!-- PRANIE PIXEL ART NA BALKONACH -->
<div class="pranie pranie-1"></div>
<div class="pranie pranie-2"></div>
<div class="pranie pranie-3"></div>
<div class="pranie pranie-4"></div>

<!-- HOTSPOT KAPIBARY -->
<div class="hotspot capy-hotspot" id="capy" title="Gadaj z kapibarą"></div>

<!-- HOTSPOT GOŚCIA LGC -->
<div class="hotspot lgc-hotspot" id="lgc-face" title="Gadaj z LGC"></div>

<!-- ANIMOWANA GĘBA LGC -->
<div class="mouth" id="mouth"></div>

<!-- POPUP HISTORIE -->
<div class="popup" id="popup">
    <h2>Historie z Ostatniego Grosza</h2>
    <p id="story"></p>
    <button onclick="closePopup()">Zamknij</button>
</div>

<!-- MENU -->
<div class="menu">
    <div class="menu-item" id="btn-start">Start</div>
    <div class="menu-item" id="btn-mapa">Mapa</div>
    <div class="menu-item" id="btn-misje">Misje</div>
    <div class="menu-item" id="btn-postacie">Postacie</div>
    <div class="menu-item" id="btn-kontakt">Kontakt</div>
</div>

<!-- CZAT KAPIBARY LGC -->
<div class="kapibara-chat" id="kapibaraChat">
  <div class="kapibara-chat-header">
    <strong>Kapibara LGC</strong>
    <span id="closeChat" style="cursor:pointer;">✖</span>
  </div>
  <div class="kapibara-chat-window" id="kapibaraChatWindow">
    <div class="msg bot">
      Siema, jestem z LGC. Pilnuję Grosza. O co pytasz, mordo?
    </div>
  </div>
  <div class="kapibara-chat-input">
    <input id="kapibaraInput" type="text" placeholder="Pisz do LGC..." autocomplete="off" />
    <button id="kapibaraSend">Wyślij</button>
  </div>
</div>

<script src="agent.js"></script>
</body>
</html>
